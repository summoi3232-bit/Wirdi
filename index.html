<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وِردي — متابعة الورد الأسبوعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-900:#0E3B36;
    --teal-800:#134A43;
    --teal-700:#1B6358;
    --gold:#C7A552;
    --gold-light:#E9D9A8;
    --maroon:#6B1E2E;
    --maroon-light:#8C2C3F;
    --paper:#F8F2E3;
    --paper-dark:#EFE4C4;
    --ink:#22302B;
    --ink-light:#647069;
    --line:#DCCFA3;
    --success:#3F7D58;
    --success-bg:#E4EFE4;
    --radius:14px;
    --shadow:0 4px 18px rgba(20,40,35,.09);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
  }
  body{
    background-image:
      radial-gradient(circle at 100% 0%, rgba(199,165,82,.08), transparent 40%),
      radial-gradient(circle at 0% 100%, rgba(14,59,54,.06), transparent 40%);
  }
  .display{font-family:'Aref Ruqaa',serif;}

  /* ===== Header ===== */
  header.top{
    background:linear-gradient(160deg,var(--teal-900),var(--teal-800));
    color:var(--paper);
    padding:22px 18px 60px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute;
    inset:auto 0 0 0;
    height:34px;
    background:var(--paper);
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    transform:scaleX(1.4);
  }
  .star-pattern{
    position:absolute;
    inset:0;
    opacity:.10;
    background-image:radial-gradient(var(--gold-light) 1.4px, transparent 1.4px);
    background-size:26px 26px;
  }
  .top-inner{position:relative;max-width:920px;margin:0 auto;text-align:center;}
  .top-inner h1{
    font-family:'Aref Ruqaa',serif;
    font-size:clamp(30px,6vw,46px);
    margin:2px 0 4px;
    color:var(--gold-light);
    letter-spacing:.5px;
  }
  .top-inner p.sub{margin:0;color:#D9E6E1;font-size:14px;font-weight:300;}
  .ring-wrap{
    margin-top:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
  }
  .ring{
    width:96px;height:96px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .ring svg{transform:rotate(-90deg);}
  .ring .txt{position:absolute;font-size:16px;font-weight:700;color:#fff;}
  .ring .lbl{position:absolute;bottom:-20px;font-size:11px;color:#CFE0DA;white-space:nowrap;}
  .top-actions{display:flex;gap:8px;justify-content:center;margin-top:26px;flex-wrap:wrap;}
  .btn{
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold-light);
    padding:8px 16px;
    border-radius:999px;
    font-family:'Tajawal',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:.15s;
  }
  .btn:hover{background:rgba(233,217,168,.14);}
  .btn.solid{background:var(--gold);color:var(--teal-900);font-weight:700;border-color:var(--gold);}
  .btn.solid:hover{background:var(--gold-light);}
  .btn.small{padding:5px 12px;font-size:12px;}
  .btn.danger{border-color:var(--maroon-light);color:#f0c7cd;}
  .btn.danger:hover{background:rgba(140,44,63,.18);}

  /* ===== Nav ===== */
  nav.days{
    max-width:960px;
    margin:-34px auto 0;
    padding:0 14px;
    position:relative;
    z-index:3;
  }
  .day-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:6px 2px 14px;
    scrollbar-width:thin;
  }
  .day-tab{
    flex:0 0 auto;
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 14px;
    min-width:108px;
    text-align:center;
    cursor:pointer;
    box-shadow:var(--shadow);
    position:relative;
    transition:.15s;
  }
  .day-tab.active{
    background:var(--teal-900);
    border-color:var(--teal-900);
    color:#fff;
  }
  .day-tab.today::before{
    content:"اليوم";
    position:absolute;
    top:-9px;right:50%;transform:translateX(50%);
    background:var(--gold);
    color:var(--teal-900);
    font-size:9px;
    padding:1px 8px;
    border-radius:999px;
    font-weight:700;
  }
  .day-tab .dname{font-family:'Aref Ruqaa',serif;font-size:19px;display:block;}
  .day-tab .dpct{font-size:11px;opacity:.75;display:block;margin-top:2px;}

  /* ===== Main ===== */
  main{max-width:920px;margin:0 auto;padding:10px 14px 60px;}
  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:18px;
  }
  .panel-head{
    padding:16px 18px 10px;
    border-bottom:1px dashed var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    flex-wrap:wrap;
  }
  .panel-head h2{font-family:'Aref Ruqaa',serif;font-size:26px;margin:0 0 3px;color:var(--teal-900);}
  .panel-head .range{font-size:12.5px;color:var(--ink-light);}
  .head-actions{display:flex;gap:6px;}
  .btn.ghost{border-color:var(--line);color:var(--teal-800);}
  .btn.ghost:hover{background:var(--paper-dark);}

  .progressbar{height:8px;background:var(--paper-dark);border-radius:999px;overflow:hidden;margin:12px 18px 0;}
  .progressbar > div{height:100%;background:linear-gradient(90deg,var(--teal-700),var(--gold));border-radius:999px;transition:width .25s;}

  ul.surah-list{list-style:none;margin:0;padding:10px 10px 16px;}
  ul.surah-list li{
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 10px;
    border-radius:10px;
    transition:.12s;
  }
  ul.surah-list li:hover{background:var(--paper);}
  ul.surah-list li.done{background:var(--success-bg);}
  .chk{
    width:24px;height:24px;flex:0 0 auto;
    border-radius:7px;
    border:2px solid var(--teal-700);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:#fff;font-size:14px;
    transition:.15s;
  }
  li.done .chk{background:var(--success);border-color:var(--success);}
  .snum{
    width:26px;height:26px;flex:0 0 auto;
    border-radius:50%;
    background:var(--paper-dark);
    color:var(--teal-900);
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;
  }
  .sname{flex:1;font-family:'Aref Ruqaa',serif;font-size:20px;color:var(--ink);cursor:pointer;}
  li.done .sname{color:var(--success);}
  .stime{
    font-size:11.5px;
    color:var(--ink-light);
    background:var(--paper);
    border:1px solid var(--line);
    padding:3px 9px;
    border-radius:999px;
    white-space:nowrap;
  }

  .friday-card{padding:26px 20px 30px;text-align:center;}
  .friday-card .mark{
    font-family:'Aref Ruqaa',serif;
    color:var(--maroon);
    font-size:30px;
    margin:0 0 6px;
  }
  .friday-card p.desc{color:var(--ink-light);font-size:13.5px;max-width:480px;margin:0 auto 20px;}
  .counter{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .counter .num{
    font-family:'Aref Ruqaa',serif;
    font-size:44px;
    color:var(--teal-900);
    min-width:90px;
  }
  .counter .of{color:var(--ink-light);font-size:14px;}
  .round-btn{
    width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);
    font-size:18px;cursor:pointer;color:var(--teal-900);
  }
  .round-btn:hover{background:var(--paper-dark);}
  .friday-target{font-size:12px;color:var(--ink-light);}
  .friday-target input{
    width:56px;border:1px solid var(--line);border-radius:8px;padding:2px 6px;font-family:'Tajawal';text-align:center;
  }
  .friday-done-btn{margin-top:6px;}

  .day-footer{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 18px 16px;flex-wrap:wrap;gap:8px;
  }
  .day-footer .stat{font-size:12.5px;color:var(--ink-light);}

  /* ===== Reports ===== */
  .tabs-row{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap;}
  .tabs-row .btn{flex:0 0 auto;}
  .tabs-row .btn.active{background:var(--teal-900);color:#fff;border-color:var(--teal-900);}
  table.report{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.report th, table.report td{border:1px solid var(--line);padding:8px 10px;text-align:center;}
  table.report th{background:var(--paper-dark);color:var(--teal-900);}
  table.report tr.total td{font-weight:700;background:var(--paper);}
  .report-controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .report-controls select, .report-controls input{
    border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-family:'Tajawal';
  }
  .stat-cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .stat-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 16px;
    text-align:center;
    min-width:120px;
    flex:1;
  }
  .stat-card .v{font-family:'Aref Ruqaa',serif;font-size:26px;color:var(--teal-900);}
  .stat-card .l{font-size:11.5px;color:var(--ink-light);}

  footer.appfoot{text-align:center;padding:20px;color:var(--ink-light);font-size:12px;}

  /* toast */
  #toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--teal-900);color:#fff;padding:9px 20px;border-radius:999px;
    font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  input[type=file]{display:none;}

  @media print{
    header.top, nav.days, .top-actions, .head-actions, .day-footer .btn, .tabs-row, .report-controls, footer.appfoot, #toast{display:none !important;}
    body{background:#fff;}
    main{padding:0;max-width:100%;}
    .panel{box-shadow:none;border:1px solid #999;}
    #app > .panel:not(.printable){display:none;}
  }
  @media (max-width:520px){
    .sname{font-size:17px;}
    .counter .num{font-size:34px;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="star-pattern"></div>
  <div class="top-inner">
    <h1>وِردي</h1>
    <p class="sub">متابعة الورد الأسبوعي من القرآن الكريم — من السبت إلى الجمعة</p>
    <div class="ring-wrap" id="ringWrap"></div>
    <div class="top-actions">
      <button class="btn solid" onclick="showView('reports')">📊 التقارير</button>
      <button class="btn" onclick="exportBackup()">⬇️ نسخة احتياطية</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">⬆️ استيراد</button>
      <input type="file" id="importFile" accept="application/json">
      <button class="btn" onclick="showView('days')">🏠 الرئيسية</button>
    </div>
  </div>
</header>

<nav class="days" id="daysNav"></nav>

<main id="app"></main>

<footer class="appfoot">حفظ تلقائي على هذا الجهاز — لا تُرسل بياناتك إلى أي خادم 🌙</footer>
<div id="toast"></div>

<script>
/* ============ DATA ============ */
const DAYS = [
  {id:'sat', name:'السبت', range:'من سورة الكهف إلى سورة الحج', surahs:[
    {n:18,name:'الكهف',min:25},{n:19,name:'مريم',min:12},{n:20,name:'طه',min:15},
    {n:21,name:'الأنبياء',min:13},{n:22,name:'الحج',min:14}
  ]},
  {id:'sun', name:'الأحد', range:'من سورة المؤمنون إلى سورة القصص', surahs:[
    {n:23,name:'المؤمنون',min:12},{n:24,name:'النور',min:13},{n:25,name:'الفرقان',min:9},
    {n:26,name:'الشعراء',min:12},{n:27,name:'النمل',min:11},{n:28,name:'القصص',min:13}
  ]},
  {id:'mon', name:'الإثنين', range:'من سورة العنكبوت إلى سورة يس', surahs:[
    {n:29,name:'العنكبوت',min:10},{n:30,name:'الروم',min:8},{n:31,name:'لقمان',min:6},
    {n:32,name:'السجدة',min:4},{n:33,name:'الأحزاب',min:14},{n:34,name:'سبأ',min:8},
    {n:35,name:'فاطر',min:7},{n:36,name:'يس',min:9}
  ]},
  {id:'tue', name:'الثلاثاء', range:'من سورة الصافات إلى سورة الزخرف', surahs:[
    {n:37,name:'الصافات',min:11},{n:38,name:'ص',min:8},{n:39,name:'الزمر',min:13},
    {n:40,name:'غافر',min:13},{n:41,name:'فصلت',min:9},{n:42,name:'الشورى',min:9},
    {n:43,name:'الزخرف',min:10}
  ]},
  {id:'wed', name:'الأربعاء', range:'من سورة الدخان إلى سورة المجادلة', surahs:[
    {n:44,name:'الدخان',min:5},{n:45,name:'الجاثية',min:5},{n:46,name:'الأحقاف',min:6},
    {n:47,name:'محمد',min:6},{n:48,name:'الفتح',min:7},{n:49,name:'الحجرات',min:4},
    {n:50,name:'ق',min:4},{n:51,name:'الذاريات',min:4},{n:52,name:'الطور',min:4},
    {n:53,name:'النجم',min:4},{n:54,name:'القمر',min:4},{n:55,name:'الرحمن',min:5},
    {n:56,name:'الواقعة',min:5},{n:57,name:'الحديد',min:6},{n:58,name:'المجادلة',min:6}
  ]},
  {id:'thu', name:'الخميس', range:'من سورة الحشر إلى سورة الناس', surahs:[
    {n:59,name:'الحشر',min:5},{n:60,name:'الممتحنة',min:4},{n:61,name:'الصف',min:2},
    {n:62,name:'الجمعة',min:2},{n:63,name:'المنافقون',min:2},{n:64,name:'التغابن',min:3},
    {n:65,name:'الطلاق',min:3},{n:66,name:'التحريم',min:3},{n:67,name:'الملك',min:4},
    {n:68,name:'القلم',min:4},{n:69,name:'الحاقة',min:3},{n:70,name:'المعارج',min:3},
    {n:71,name:'نوح',min:3},{n:72,name:'الجن',min:3},{n:73,name:'المزمل',min:2},
    {n:74,name:'المدثر',min:3},{n:75,name:'القيامة',min:2},{n:76,name:'الإنسان',min:3},
    {n:77,name:'المرسلات',min:2},{n:78,name:'النبأ',min:2},{n:79,name:'النازعات',min:2},
    {n:80,name:'عبس',min:2},{n:81,name:'التكوير',min:1},{n:82,name:'الانفطار',min:1},
    {n:83,name:'المطففين',min:2},{n:84,name:'الانشقاق',min:1},{n:85,name:'البروج',min:1},
    {n:86,name:'الطارق',min:1},{n:87,name:'الأعلى',min:1},{n:88,name:'الغاشية',min:1},
    {n:89,name:'الفجر',min:2},{n:90,name:'البلد',min:1},{n:91,name:'الشمس',min:1},
    {n:92,name:'الليل',min:1},{n:93,name:'الضحى',min:1},{n:94,name:'الشرح',min:1},
    {n:95,name:'التين',min:1},{n:96,name:'العلق',min:1},{n:97,name:'القدر',min:1},
    {n:98,name:'البينة',min:1},{n:99,name:'الزلزلة',min:1},{n:100,name:'العاديات',min:1},
    {n:101,name:'القارعة',min:1},{n:102,name:'التكاثر',min:1},{n:103,name:'العصر',min:1},
    {n:104,name:'الهمزة',min:1},{n:105,name:'الفيل',min:1},{n:106,name:'قريش',min:1},
    {n:107,name:'الماعون',min:1},{n:108,name:'الكوثر',min:1},{n:109,name:'الكافرون',min:1},
    {n:110,name:'النصر',min:1},{n:111,name:'المسد',min:1},{n:112,name:'الإخلاص',min:1},
    {n:113,name:'الفلق',min:1},{n:114,name:'الناس',min:1}
  ]},
  {id:'fri', name:'الجمعة', special:true, range:'الإكثار من الصلاة على النبي ﷺ'}
];
const JS_DOW = {sat:6, sun:0, mon:1, tue:2, wed:3, thu:4, fri:5};
const WEEK_ORDER = ['sat','sun','mon','tue','wed','thu','fri'];
const DAY_TOTAL_ITEMS = {}; // dayId -> item count (surahs count, or 1 for friday)
DAYS.forEach(d=> DAY_TOTAL_ITEMS[d.id] = d.special ? 1 : d.surahs.length);
const WEEK_TOTAL_ITEMS = Object.values(DAY_TOTAL_ITEMS).reduce((a,b)=>a+b,0);
const DEFAULT_FRIDAY_TARGET = 100;

/* ============ STORAGE ============ */
const LS_LOG = 'wird_log_v1';          // array of {week, day, item, date, count?}
const LS_TARGET = 'wird_friday_target';

function loadLog(){
  try{ return JSON.parse(localStorage.getItem(LS_LOG)) || []; }catch(e){ return []; }
}
function saveLog(log){
  localStorage.setItem(LS_LOG, JSON.stringify(log));
}
function getFridayTarget(){
  return parseInt(localStorage.getItem(LS_TARGET)) || DEFAULT_FRIDAY_TARGET;
}
function setFridayTarget(v){
  localStorage.setItem(LS_TARGET, String(v));
}

let LOG = loadLog();

/* ============ DATE HELPERS ============ */
function pad(n){return String(n).padStart(2,'0');}
function toISO(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function weekStartOf(date){
  const d = new Date(date);
  const dow = d.getDay(); // 0..6 Sun..Sat
  const diff = (dow - 6 + 7) % 7; // days since last Saturday
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return toISO(d);
}
function todayDayId(){
  const dow = new Date().getDay();
  return Object.keys(JS_DOW).find(k=>JS_DOW[k]===dow);
}
function currentWeekStart(){ return weekStartOf(new Date()); }
const ARABIC_DIGITS = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
function ar(n){ return String(n).split('').map(c=> /[0-9]/.test(c) ? ARABIC_DIGITS[c] : c).join(''); }

/* ============ LOG QUERIES ============ */
function findEntry(week, day, item){
  return LOG.find(e=>e.week===week && e.day===day && e.item===item);
}
function toggleItem(week, day, item){
  const idx = LOG.findIndex(e=>e.week===week && e.day===day && e.item===item);
  if(idx>=0){ LOG.splice(idx,1); }
  else{ LOG.push({week, day, item, date: toISO(new Date())}); }
  saveLog(LOG);
}
function setFridayCount(week, count, target){
  const idx = LOG.findIndex(e=>e.week===week && e.day==='fri' && e.item==='salah');
  const done = count >= target;
  if(count<=0 && idx>=0){ LOG.splice(idx,1); saveLog(LOG); return; }
  if(idx>=0){ LOG[idx].count = count; LOG[idx].done = done; LOG[idx].date = toISO(new Date()); }
  else{ LOG.push({week, day:'fri', item:'salah', count, done, date: toISO(new Date())}); }
  saveLog(LOG);
}
function dayCompletedCount(week, dayObj){
  if(dayObj.special){
    const e = LOG.find(x=>x.week===week && x.day==='fri' && x.item==='salah');
    return (e && e.done) ? 1 : 0;
  }
  return dayObj.surahs.filter(s=> findEntry(week, dayObj.id, s.n)).length;
}
function weekCompletedCount(week){
  return DAYS.reduce((sum,d)=> sum + dayCompletedCount(week, d), 0);
}
function allWeeksInLog(){
  const s = new Set(LOG.map(e=>e.week));
  s.add(currentWeekStart());
  return Array.from(s).sort();
}

/* ============ UI STATE ============ */
let currentView = 'days';       // 'days' | 'reports'
let currentDay = todayDayId();
let reportMode = 'weekly';

/* ============ RENDER: NAV ============ */
function renderNav(){
  const nav = document.getElementById('daysNav');
  const wk = currentWeekStart();
  const today = todayDayId();
  nav.innerHTML = `<div class="day-tabs">${DAYS.map(d=>{
    const done = dayCompletedCount(wk,d);
    const total = DAY_TOTAL_ITEMS[d.id];
    const pct = Math.round(done/total*100);
    return `<div class="day-tab ${currentView==='days'&&currentDay===d.id?'active':''} ${d.id===today?'today':''}" onclick="selectDay('${d.id}')">
      <span class="dname">${d.name}</span>
      <span class="dpct">${ar(pct)}٪ (${ar(done)}/${ar(total)})</span>
    </div>`;
  }).join('')}</div>`;
}
function selectDay(id){ currentView='days'; currentDay=id; render(); }
function showView(v){ currentView=v; render(); }

/* ============ RENDER: RINGS (header) ============ */
function ringSVG(pct, color){
  const r=40, c=2*Math.PI*r;
  const off = c - (pct/100)*c;
  return `<svg width="96" height="96"><circle cx="48" cy="48" r="${r}" stroke="rgba(255,255,255,.18)" stroke-width="8" fill="none"/>
  <circle cx="48" cy="48" r="${r}" stroke="${color}" stroke-width="8" fill="none" stroke-linecap="round"
   stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;
}
function renderRings(){
  const wk = currentWeekStart();
  const done = weekCompletedCount(wk);
  const pct = Math.round(done/WEEK_TOTAL_ITEMS*100);
  document.getElementById('ringWrap').innerHTML = `
    <div class="ring">${ringSVG(pct,'#C7A552')}<span class="txt">${ar(pct)}٪</span><span class="lbl">إنجاز هذا الأسبوع</span></div>
  `;
}

/* ============ RENDER: DAY PANEL ============ */
function renderDayPanel(){
  const d = DAYS.find(x=>x.id===currentDay);
  const wk = currentWeekStart();
  const total = DAY_TOTAL_ITEMS[d.id];
  const done = dayCompletedCount(wk, d);
  const pct = Math.round(done/total*100);

  if(d.special){
    const e = LOG.find(x=>x.week===wk && x.day==='fri' && x.item==='salah');
    const count = e ? (e.count||0) : 0;
    const target = getFridayTarget();
    const isDone = count>=target;
    return `
    <div class="panel">
      <div class="panel-head">
        <div><h2>${d.name}</h2><div class="range">${d.range}</div></div>
        <div class="head-actions"><button class="btn ghost small" onclick="printDay()">🖨️ طباعة</button></div>
      </div>
      <div class="progressbar"><div style="width:${pct}%"></div></div>
      <div class="friday-card">
        <p class="mark">﷽ اللهم صلِّ وسلم على نبينا محمد ﷺ</p>
        <p class="desc">أكثِر من الصلاة على النبي ﷺ يوم الجمعة، فقد ورد الحث على ذلك في الحديث الشريف. حدد هدفك اليومي وتابع تقدمك.</p>
        <div class="counter">
          <button class="round-btn" onclick="fridayAdjust(-10)">−١٠</button>
          <button class="round-btn" onclick="fridayAdjust(-1)">−</button>
          <div><div class="num">${ar(count)}</div><div class="of">من ${ar(target)}</div></div>
          <button class="round-btn" onclick="fridayAdjust(1)">+</button>
          <button class="round-btn" onclick="fridayAdjust(10)">+١٠</button>
        </div>
        <div class="friday-target">الهدف اليومي: <input type="number" min="1" value="${target}" onchange="changeFridayTarget(this.value)"> صلاة</div>
        <div class="friday-done-btn">
          <button class="btn ${isDone?'solid':'ghost'}" onclick="fridayToggleDone(${count},${target})">${isDone? '✓ تم إنجاز الورد' : 'وضع علامة إنجاز يدويًا'}</button>
        </div>
      </div>
      <div class="day-footer">
        <span class="stat">${isDone? 'أُنجز ورد اليوم ✅' : 'لم يُنجز بعد'}</span>
      </div>
    </div>`;
  }

  return `
  <div class="panel">
    <div class="panel-head">
      <div><h2>${d.name}</h2><div class="range">${d.range}</div></div>
      <div class="head-actions">
        <button class="btn ghost small" onclick="markAll('${d.id}', true)">تحديد الكل</button>
        <button class="btn ghost small" onclick="markAll('${d.id}', false)">إلغاء الكل</button>
        <button class="btn ghost small" onclick="printDay()">🖨️ طباعة</button>
      </div>
    </div>
    <div class="progressbar"><div style="width:${pct}%"></div></div>
    <ul class="surah-list">
      ${d.surahs.map(s=>{
        const isDone = !!findEntry(wk, d.id, s.n);
        return `<li class="${isDone?'done':''}">
          <div class="chk" onclick="toggleSurah('${d.id}', ${s.n})">${isDone?'✓':''}</div>
          <div class="snum">${ar(s.n)}</div>
          <div class="sname" onclick="toggleSurah('${d.id}', ${s.n})">سورة ${s.name}</div>
          <div class="stime">≈ ${ar(s.min)} د</div>
        </li>`;
      }).join('')}
    </ul>
    <div class="day-footer">
      <span class="stat">أُنجز ${ar(done)} من ${ar(total)} سورة (${ar(pct)}٪)</span>
    </div>
  </div>`;
}
function toggleSurah(dayId, n){
  toggleItem(currentWeekStart(), dayId, n);
  render();
  toast('تم الحفظ تلقائيًا');
}
function markAll(dayId, val){
  const d = DAYS.find(x=>x.id===dayId);
  const wk = currentWeekStart();
  d.surahs.forEach(s=>{
    const exists = !!findEntry(wk, dayId, s.n);
    if(val && !exists) toggleItem(wk, dayId, s.n);
    if(!val && exists) toggleItem(wk, dayId, s.n);
  });
  render();
  toast(val? 'تم تحديد كل السور':'تم إلغاء التحديد');
}
function fridayAdjust(delta){
  const wk = currentWeekStart();
  const e = LOG.find(x=>x.week===wk && x.day==='fri' && x.item==='salah');
  let count = e? (e.count||0):0;
  count = Math.max(0, count+delta);
  setFridayCount(wk, count, getFridayTarget());
  render();
  toast('تم الحفظ تلقائيًا');
}
function fridayToggleDone(count, target){
  const wk = currentWeekStart();
  const willBeDone = count < target;
  setFridayCount(wk, willBeDone? target : count, target);
  render();
}
function changeFridayTarget(v){
  const t = Math.max(1, parseInt(v)||DEFAULT_FRIDAY_TARGET);
  setFridayTarget(t);
  render();
}

/* ============ REPORTS ============ */
function renderReports(){
  return `
  <div class="panel">
    <div class="panel-head"><div><h2>التقارير</h2><div class="range">تقارير أسبوعية وشهرية وسنوية قابلة للطباعة</div></div>
      <div class="head-actions"><button class="btn ghost small" onclick="window.print()">🖨️ طباعة التقرير</button></div>
    </div>
    <div style="padding:16px 18px;">
      <div class="tabs-row">
        <button class="btn ${reportMode==='weekly'?'active':''}" onclick="setReportMode('weekly')">أسبوعي</button>
        <button class="btn ${reportMode==='monthly'?'active':''}" onclick="setReportMode('monthly')">شهري</button>
        <button class="btn ${reportMode==='yearly'?'active':''}" onclick="setReportMode('yearly')">سنوي</button>
      </div>
      <div id="reportBody"></div>
    </div>
  </div>`;
}
function setReportMode(m){ reportMode=m; renderReportBody(); }

function renderReportBody(){
  const el = document.getElementById('reportBody');
  if(!el) return;
  if(reportMode==='weekly') el.innerHTML = weeklyReportHTML();
  if(reportMode==='monthly') el.innerHTML = monthlyReportHTML();
  if(reportMode==='yearly') el.innerHTML = yearlyReportHTML();
}

function weeklyReportHTML(){
  const weeks = allWeeksInLog().reverse();
  window.__selWeek = window.__selWeek || currentWeekStart();
  const wk = window.__selWeek;
  const done = weekCompletedCount(wk);
  const pct = Math.round(done/WEEK_TOTAL_ITEMS*100);
  const rows = DAYS.map(d=>{
    const t = DAY_TOTAL_ITEMS[d.id];
    const dn = dayCompletedCount(wk, d);
    return `<tr><td>${d.name}</td><td>${d.range}</td><td>${ar(dn)} / ${ar(t)}</td><td>${ar(Math.round(dn/t*100))}٪</td></tr>`;
  }).join('');
  return `
  <div class="report-controls">
    <label>اختر الأسبوع (يبدأ من السبت):</label>
    <select onchange="window.__selWeek=this.value; renderReportBody();">
      ${weeks.map(w=>`<option value="${w}" ${w===wk?'selected':''}>${w}</option>`).join('')}
    </select>
  </div>
  <div class="stat-cards">
    <div class="stat-card"><div class="v">${ar(done)}/${ar(WEEK_TOTAL_ITEMS)}</div><div class="l">عناصر مُنجزة</div></div>
    <div class="stat-card"><div class="v">${ar(pct)}٪</div><div class="l">نسبة الإنجاز</div></div>
  </div>
  <table class="report">
    <thead><tr><th>اليوم</th><th>النطاق</th><th>المُنجز</th><th>النسبة</th></tr></thead>
    <tbody>${rows}</tbody>
    <tr class="total"><td colspan="2">الإجمالي</td><td>${ar(done)} / ${ar(WEEK_TOTAL_ITEMS)}</td><td>${ar(pct)}٪</td></tr>
  </table>`;
}

function monthlyReportHTML(){
  window.__selMonth = window.__selMonth || toISO(new Date()).slice(0,7);
  const ym = window.__selMonth;
  const weeksInMonth = allWeeksInLog().filter(w=> w.slice(0,7)===ym || sameMonthSpan(w, ym));
  const totalPossible = weeksInMonth.length * WEEK_TOTAL_ITEMS;
  let totalDone = 0;
  const rows = weeksInMonth.sort().map(w=>{
    const dn = weekCompletedCount(w);
    totalDone += dn;
    return `<tr><td>الأسبوع بداية ${w}</td><td>${ar(dn)} / ${ar(WEEK_TOTAL_ITEMS)}</td><td>${ar(Math.round(dn/WEEK_TOTAL_ITEMS*100))}٪</td></tr>`;
  }).join('') || `<tr><td colspan="3">لا توجد بيانات لهذا الشهر</td></tr>`;
  const pct = totalPossible? Math.round(totalDone/totalPossible*100):0;
  return `
  <div class="report-controls">
    <label>اختر الشهر:</label>
    <input type="month" value="${ym}" onchange="window.__selMonth=this.value; renderReportBody();">
  </div>
  <div class="stat-cards">
    <div class="stat-card"><div class="v">${ar(totalDone)}</div><div class="l">عناصر مُنجزة</div></div>
    <div class="stat-card"><div class="v">${ar(weeksInMonth.length)}</div><div class="l">عدد الأسابيع</div></div>
    <div class="stat-card"><div class="v">${ar(pct)}٪</div><div class="l">متوسط الإنجاز</div></div>
  </div>
  <table class="report"><thead><tr><th>الأسبوع</th><th>المُنجز</th><th>النسبة</th></tr></thead>
  <tbody>${rows}</tbody></table>`;
}
function sameMonthSpan(weekStart, ym){
  // include a week if any day within it falls in target month
  const d = new Date(weekStart);
  for(let i=0;i<7;i++){
    const cur = new Date(d); cur.setDate(d.getDate()+i);
    if(toISO(cur).slice(0,7)===ym) return true;
  }
  return false;
}

function yearlyReportHTML(){
  window.__selYear = window.__selYear || String(new Date().getFullYear());
  const yr = window.__selYear;
  const months = Array.from({length:12},(_,i)=> `${yr}-${pad(i+1)}`);
  let totalDone=0, totalPossible=0;
  const rows = months.map((ym,i)=>{
    const weeksInMonth = allWeeksInLog().filter(w=> sameMonthSpan(w, ym));
    const dn = weeksInMonth.reduce((s,w)=> s+weekCompletedCount(w), 0);
    const possible = weeksInMonth.length*WEEK_TOTAL_ITEMS;
    totalDone += dn; totalPossible += possible;
    const pct = possible? Math.round(dn/possible*100):0;
    const monthName = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'][i];
    return `<tr><td>${monthName}</td><td>${ar(dn)}</td><td>${possible? ar(pct)+'٪':'—'}</td></tr>`;
  }).join('');
  const pct = totalPossible? Math.round(totalDone/totalPossible*100):0;
  return `
  <div class="report-controls">
    <label>اختر السنة:</label>
    <input type="number" style="width:90px" value="${yr}" onchange="window.__selYear=this.value; renderReportBody();">
  </div>
  <div class="stat-cards">
    <div class="stat-card"><div class="v">${ar(totalDone)}</div><div class="l">عناصر مُنجزة خلال السنة</div></div>
    <div class="stat-card"><div class="v">${ar(pct)}٪</div><div class="l">متوسط الإنجاز السنوي</div></div>
  </div>
  <table class="report"><thead><tr><th>الشهر</th><th>المُنجز</th><th>النسبة</th></tr></thead>
  <tbody>${rows}</tbody></table>`;
}

/* ============ BACKUP / IMPORT ============ */
function exportBackup(){
  const data = { log: LOG, fridayTarget: getFridayTarget(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wird-backup-${toISO(new Date())}.json`;
  a.click();
  toast('تم تنزيل النسخة الاحتياطية');
}
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('importFile').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      try{
        const data = JSON.parse(evt.target.result);
        if(Array.isArray(data.log)){
          LOG = data.log;
          saveLog(LOG);
          if(data.fridayTarget) setFridayTarget(data.fridayTarget);
          render();
          toast('تم استيراد البيانات بنجاح');
        } else { toast('ملف غير صالح'); }
      }catch(err){ toast('تعذّر قراءة الملف'); }
    };
    reader.readAsText(file);
  });
});

/* ============ TOAST ============ */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ============ PRINT SINGLE DAY ============ */
function printDay(){ window.print(); }

/* ============ MAIN RENDER ============ */
function render(){
  renderNav();
  renderRings();
  const app = document.getElementById('app');
  if(currentView==='days'){
    app.innerHTML = `<div class="panel printable">${''}</div>`; // placeholder replaced below
    app.innerHTML = renderDayPanel();
    app.querySelector('.panel').classList.add('printable');
  } else {
    app.innerHTML = renderReports();
    app.querySelector('.panel').classList.add('printable');
    renderReportBody();
  }
}
render();
</script>
</body>
</html>
